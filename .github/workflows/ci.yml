name: CI

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 3
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Go 1.22.4
        uses: actions/setup-go@v5
        with:
          go-version: "1.22.4"
          cache: true
      - name: Download dependencies
        run: go mod download
      - name: Run go vet (static analysis)
        run: go vet ./...
      - name: Run tests with race detector
        run: go test -race -v -count=1 ./...
        env:
          REDIS_URL: localhost:6379
