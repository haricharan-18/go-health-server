services:

  redis:
    image: redis:7-alpine
    container_name: redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  app1:
    build: .
    container_name: app1
    environment:
      PORT: 8080
      NODE_ID: node-1
      REDIS_URL: redis:6379
    ports:
      - "8080:8080"
    depends_on:
      - redis

  app2:
    build: .
    container_name: app2
    environment:
      PORT: 8080
      NODE_ID: node-2
      REDIS_URL: redis:6379
    ports:
      - "8081:8080"
    depends_on:
      - redis

=======
  app1:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 256M
        reservations:
          cpus: "0.25"
          memory: 128M

  app2:
    build:
      context: .
      dockerfile: Dockerfile.server2
    ports:
      - "8081:8081"
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 256M
        reservations:
          cpus: "0.25"
          memory: 128M

  redis:
    image: redis:7-alpine
    command: redis-server --maxmemory 128mb --maxmemory-policy allkeys-lru --appendonly yes

    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

    ports:
      - "6379:6379"

    volumes:
      - redis_data:/data

volumes:
  redis_data:
