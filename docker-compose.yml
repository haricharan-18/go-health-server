services:
  redis:
    image: redis:7-alpine
    container_name: redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  app1:
    build: .
    container_name: app1
    environment:
      PORT: 8080
      NODE_ID: node-1
      REDIS_URL: redis:6379
    ports:
      - "8080:8080"
    depends_on:
      - redis

  app2:
    build: .
    container_name: app2
    environment:
      PORT: 8080
      NODE_ID: node-2
      REDIS_URL: redis:6379
    ports:
      - "8081:8080"
    depends_on:
      - redis

volumes:
  redis_data:
